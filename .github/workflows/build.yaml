# .github/workflows/build.yml
name: Build

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix-build -E 'with import <nixpkgs> {}; callPackage ./default.nix {}'

  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix-build -E 'with import <nixpkgs> {}; callPackage ./default.nix {}'
